<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Itinerario de Viaje</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=2">
</head>
<body>

  <section id="loading-screen" class="screen">
    <div class="setup-card loading-card">
      <div class="setup-stamp spin">✈</div>
      <p class="subtitle">Cargando tu itinerario…</p>
    </div>
  </section>

  <section id="setup-screen" class="screen hidden">
    <div class="setup-card">
      <div class="setup-stamp">✈</div>
      <h1>Planea tu viaje</h1>
      <p class="subtitle">Dale un nombre y define las fechas para armar tu calendario.</p>
      <form id="setup-form">
        <label>
          Nombre del viaje
          <input type="text" id="setup-name" placeholder="Ej. Japón 2026" required>
        </label>
        <div class="date-row">
          <label>
            Fecha de inicio
            <input type="date" id="setup-start" required>
          </label>
          <label>
            Fecha de fin
            <input type="date" id="setup-end" required>
          </label>
        </div>
        <button type="submit" class="btn-primary">Crear itinerario</button>
      </form>
    </div>
  </section>

  <section id="load-error-screen" class="screen hidden">
    <div class="setup-card">
      <div class="setup-stamp error">⚠</div>
      <h1>No se pudo cargar</h1>
      <p class="subtitle">No logramos conectar con la base de datos para traer tu itinerario. Puede ser tu conexión a internet. No se creó nada nuevo — tu viaje sigue guardado.</p>
      <button id="retry-load-btn" class="btn-primary" style="width:100%">Reintentar</button>
    </div>
  </section>

  <section id="app-screen" class="screen hidden">
    <header class="app-header">
      <h1 id="trip-name"></h1>
      <div class="header-actions">
        <div id="budget-summary" class="budget-summary"></div>
        <button id="view-toggle-btn" class="btn-secondary mobile-only">Ver todos los días</button>
        <button id="add-activity-btn" class="btn-primary">+ Actividad</button>
      </div>
    </header>

    <div id="day-tabs" class="day-tabs"></div>

    <div class="calendar-wrapper" id="calendar-wrapper">
      <div id="calendar-grid" class="calendar-grid"></div>
    </div>

    <div id="day-list" class="day-list"></div>
  </section>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" id="modal"></div>
  </div>

  <script src="js/storage.js?v=2"></script>
  <script src="js/render.js?v=2"></script>
  <script src="js/app.js?v=2"></script>
</body>
</html>
